name: NemuriScan
options:
  bundleIdPrefix: com.tokyonasu
  deploymentTarget:
    iOS: "16.0"

packages:
  GoogleMobileAds:
    url: https://github.com/googleads/swift-package-manager-google-mobile-ads.git
    exactVersion: 11.13.0

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: 1
    PRODUCT_BUNDLE_IDENTIFIER: com.tokyonasu.nemuriscan
    DEVELOPMENT_TEAM: 83VGKGSQUH
    CODE_SIGN_STYLE: Automatic

targets:
  NemuriScan:
    type: application
    platform: iOS
    sources:
      - path: NemuriScan
        excludes:
          - Info.plist
          - "*.entitlements"
    dependencies:
      - package: GoogleMobileAds
    entitlements:
      path: NemuriScan/NemuriScan.entitlements
    settings:
      base:
        INFOPLIST_FILE: NemuriScan/Info.plist
        PRODUCT_NAME: NemuriScan
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: YES
    info:
      path: NemuriScan/Info.plist
      properties:
        CFBundleName: NemuriScan
        CFBundleDisplayName: ネムリスキャン
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleIconName: AppIcon
        LSRequiresIPhoneOS: true
        UILaunchScreen:
          UIColorName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSMicrophoneUsageDescription: "睡眠中の呼吸音やいびきを分析するためにマイクを使用します。Sleep analysis requires microphone access to detect snoring and breathing patterns."
        NSHealthShareUsageDescription: "睡眠データをヘルスケアアプリと共有します。Share sleep data with the Health app."
        NSHealthUpdateUsageDescription: "睡眠データをヘルスケアアプリに記録します。Write sleep data to the Health app."
        NSUserTrackingUsageDescription: "広告の配信と効果測定のために使用します。Used for ad delivery and measurement."
        UIBackgroundModes:
          - audio
        GADApplicationIdentifier: ca-app-pub-3940256099942544~3347511713
        SKAdNetworkItems:
          - SKAdNetworkIdentifier: cstr6suwn9.skadnetwork
          - SKAdNetworkIdentifier: 4fzdc2evr5.skadnetwork
          - SKAdNetworkIdentifier: 2fnua5tdw4.skadnetwork
          - SKAdNetworkIdentifier: ydx93a7ass.skadnetwork
          - SKAdNetworkIdentifier: 5a6flpkh64.skadnetwork
          - SKAdNetworkIdentifier: p78axxw29g.skadnetwork
          - SKAdNetworkIdentifier: v72qych5uu.skadnetwork
          - SKAdNetworkIdentifier: 3rd42ekr43.skadnetwork
          - SKAdNetworkIdentifier: 3qcr597p9d.skadnetwork
